name: CI - Build, Test & Push Image

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cancel in-progress runs on the same branch/PR to avoid wasted queues
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===================================================================
  # JOB 1: Build & Run Tests
  # ===================================================================
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven Tests & Build
        run: ./mvnw clean verify -B --no-transfer-progress

      - name: Upload JUnit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-reports
          path: target/surefire-reports/
          retention-days: 7

      # Cache compiled classes so subsequent jobs skip recompilation
      - name: Cache compiled target
        uses: actions/cache/save@v4
        with:
          path: target
          key: target-${{ github.sha }}

  # ===================================================================
  # JOB 2: CodeQL Security Analysis (advisory — runs in parallel with Job 3)
  # ===================================================================
  codeql-analysis:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore compiled target
        uses: actions/cache/restore@v4
        with:
          path: target
          key: target-${{ github.sha }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended
          build-mode: manual

      - name: Build for CodeQL
        # Incremental compile — compiled classes already restored from cache
        run: ./mvnw compile -B --no-transfer-progress

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ===================================================================
  # JOB 3: Build & Push Docker Image
  # ===================================================================
  build-and-push-image:
    name: Build and push to GHCR
    # Only depends on tests passing — CodeQL runs in parallel as advisory
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Required for git describe --tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore compiled target
        uses: actions/cache/restore@v4
        with:
          path: target
          key: target-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}