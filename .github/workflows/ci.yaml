name: CI - Build, Test & Push Image

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ===================================================================
  # JOB 1: Build & Run Tests
  # ===================================================================
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest
    # This job compiles the code, runs unit tests, integration tests,
    # and packages the application.

    steps:
      - name: Checkout Code
        # Step: Pull the latest code from the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        # Step: Install Java 17 (required for Spring Boot)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven Tests & Build
        # Step: Clean, compile, run all tests (unit + integration), and package the app
        run: ./mvnw clean verify -B --no-transfer-progress

      - name: Upload JUnit Test Reports
        # Step: Save test reports as artifact so you can download them later
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ===================================================================
  # JOB 2: CodeQL Security Analysis
  # ===================================================================
  codeql-analysis:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    # This job scans the Java code for security vulnerabilities using GitHub's CodeQL.
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        # Step: Get the source code for scanning
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        # Step: Set up CodeQL engine for Java language
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended
          build-mode: manual          # Important: We are building manually

      - name: Run Maven Build (Important for CodeQL)
        # This step ensures CodeQL has compiled classes to analyze
        run: ./mvnw clean compile -B --no-transfer-progress

      - name: Perform CodeQL Analysis
        # Step: Run the actual security scan and upload results to GitHub
        uses: github/codeql-action/analyze@v3

  # ===================================================================
  # JOB 3: Build & Push Docker Image
  # ===================================================================
  build-and-push-image:
    name: Build and push to GHCR(GitHub Container Registry)
    needs: [build-and-test, codeql-analysis]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # This job only runs when code is merged to main branch.
    # It builds the Docker image using Spring Boot Buildpacks and pushes it to GHCR.
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        # Step: Pull the latest code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        # Step: Install Java (needed for Maven build-image goal)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Login to GitHub Container Registry
        # Step: Authenticate to ghcr.io so we can push the image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version
        id: version
        run: | # Use Git Tag (Recommended)
          VERSION=$(git describe --tags --always | sed 's/^v//')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      # Step: Build OCI image using Spring Boot's buildpacks and push to GHCR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

      - name: Update Kubernetes manifest with new image tag
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          sed -i "s|image: .*|image: $IMAGE|g" k8s/petclinic-deployment.yaml
      
      - name: Commit & push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          git commit -m "chore: update image to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push