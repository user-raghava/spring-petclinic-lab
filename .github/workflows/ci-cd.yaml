name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==================== CI ====================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'                  # speeds up builds

      - name: Build & Run Tests
        run: ./mvnw clean verify -B --no-transfer-progress
        # "verify" runs compile + tests + packaging
        # Testcontainers will automatically start MySQL/PostgreSQL during integration tests

      - name: Upload test reports (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  # ==================== CD (only on main) ====================
  build-and-push-image:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # only run on merge to main

    permissions:
      contents: read
      packages: write                     # needed to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName=ghcr.io/${{ github.repository_owner }}/spring-petclinic-lab:${{ github.sha }} \
            -Dspring-boot.build-image.imageName=ghcr.io/${{ github.repository_owner }}/spring-petclinic-lab:latest \
            --no-transfer-progress