apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-petclinic
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/user-raghava/spring-petclinic-lab.git   
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: spring-petclinic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
